spring.config.import=optional:file:.env
server.port=${PORT:8080}
# ========= Application =========
spring.application.name=ProductClientService
server.address=0.0.0.0
app.frontend.base-url=${FRONTEND_BASE_URL}

# ========= Database =========
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ========= Redis =========
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.username=${REDIS_USERNAME}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED}

# ========= JWT =========
jwt.private.key.path=classpath:keys/private_key.pem
jwt.public.key.path=classpath:keys/public_key.pem
jwt.expiration.in.millis=9000000
jwt.refresh.expiration.days=7

# ========= Feign Clients =========
feign.client.orderpaymentnotification.url=http://localhost:8082
feign.client.delivery_inventory_client.url=${DELIVERY_INVENTORY_CLIENT_URL}
delivery.client.id=${DELIVERY_CLIENT_ID:product-client-service}
delivery.client.password=${DELIVERY_CLIENT_PASSWORD:secret123}

# ========= Google API =========
google.api.key=${GOOGLE_API_KEY}

# ========= Elasticsearch (local network) =========
elasticsearch.url=${ELASTICSEARCH_URL}

# ========= AWS S3 =========
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.region.static=${AWS_REGION}
cloud.aws.s3.bucket-name=${AWS_S3_BUCKET}

# ========= Internal Service API Key =========
internal.api.key=${INTERNAL_API_KEY}

# ========= Kafka =========
kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

# ========= Cloudinary =========
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB

# ========= Observability =========
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.distribution.percentiles.reco_request_seconds=0.5,0.9,0.95,0.99
management.metrics.distribution.percentiles.sim_request_seconds=0.5,0.9,0.95,0.99
management.metrics.distribution.sla.reco_request_seconds=0.08
management.metrics.distribution.sla.sim_request_seconds=0.05

# ========= Recommendation feature flags =========
# Flip to true during sale-day degraded mode: skip reco-serving entirely,
# serve only precomputed Redis lists (pre-warmed via /internal/v1/reco/prewarm).
# hukjifrkioiookgotokokktg
reco.degradedMode=false
reco.serving.enabled=false
reco.serving.baseUrl=http://reco-serving:8100
reco.similarity.vectorsEnabled=false
reco.similarity.textModelVersion=mlt_v1

# ========= Aadhaar Verification =========
aadhaar.api.endpoint=${AADHAAR_API_ENDPOINT}
aadhaar.api.key=tgghjjmmhhh
aadhaar.verification.bypass=true
